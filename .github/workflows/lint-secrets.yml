name: Lint Secrets

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Defense-in-depth: the pre-commit hook at config/hooks/pre-commit-secret-scan.sh
# catches leaks locally. This workflow is the second line — it runs the same
# regex on every push, blocking the merge if anything slipped past.
#
# Design note: unlike the memex public blueprint, this repo is PRIVATE and
# personal. We DO NOT scan for personal identifiers (user, user, [employer],
# rsya, [side-project]) — those appear in legitimate content every commit. We only
# scan for raw secret material: token prefixes and high-entropy hex strings.
#
# Security note: this workflow does NOT use any untrusted GitHub input
# (github.event.*, github.head_ref, etc). All commands run against checked-out
# files only. No injection surface.

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan tracked files for leaked tokens
        run: |
          # Hard token patterns — any hit blocks the merge. Second line of
          # defense after the pre-commit hook. Patterns:
          #   cfut_           Cloudflare API token
          #   ghp_            GitHub classic PAT
          #   gho_            GitHub OAuth token
          #   github_pat_     GitHub fine-grained PAT
          #   grn_            Granola API key
          #   sk-             OpenAI / Anthropic API key prefix
          #   [0-9a-f]{60,}   long hex (generic bearer, legacy MCP token)
          set +e
          HITS=$(grep -rEn \
            -e '(^|[^A-Za-z0-9_])cfut_[A-Za-z0-9_]{20,}' \
            -e '(^|[^A-Za-z0-9_])ghp_[A-Za-z0-9_]{20,}' \
            -e '(^|[^A-Za-z0-9_])gho_[A-Za-z0-9_]{20,}' \
            -e '(^|[^A-Za-z0-9_])github_pat_[A-Za-z0-9_]{20,}' \
            -e '(^|[^A-Za-z0-9_])grn_[A-Za-z0-9_]{20,}' \
            -e '(^|[^A-Za-z0-9_])sk-[A-Za-z0-9_-]{30,}' \
            -e '(^|[^A-Za-z0-9_])[0-9a-f]{60,}([^A-Za-z0-9_]|$)' \
            --include='*.md' --include='*.ts' --include='*.js' \
            --include='*.json' --include='*.yml' --include='*.yaml' \
            --include='*.toml' --include='*.sh' --include='*.bash' \
            --include='*.env' --include='*.example' \
            --exclude-dir=node_modules --exclude-dir=.git \
            --exclude-dir=.claude --exclude-dir=.wrangler \
            --exclude='package-lock.json' \
            --exclude='lint-secrets.yml' \
            --exclude='pre-commit-secret-scan.sh' \
            --exclude='SECURITY.md' \
            . 2>/dev/null)
          set -e
          if [ -n "$HITS" ]; then
            echo "::error::Potential leaked secret(s) found — rotate immediately and scrub from HEAD:"
            echo "$HITS"
            exit 1
          fi
          echo "No leaked secrets detected."

      - name: Verify worker source has no hardcoded tokens
        run: |
          # Separate check for the worker source — any string literal that
          # looks like a bearer header value is a blocker even if it doesn't
          # match the token-prefix regex (e.g. template strings, fake values).
          set +e
          HITS=$(grep -rEn \
            -e 'Authorization.*Bearer [A-Za-z0-9_-]{30,}' \
            config/mcp-worker/src/ 2>/dev/null \
            | grep -v '\${env\.' \
            | grep -v '\${GITHUB_PAT}' \
            | grep -v 'env.GITHUB_PAT' \
            | grep -v 'env.AUTH_PATH_TOKEN')
          set -e
          if [ -n "$HITS" ]; then
            echo "::error::Hardcoded Bearer token in worker source:"
            echo "$HITS"
            exit 1
          fi
          echo "Worker source clean — all auth via env vars."
